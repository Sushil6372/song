<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Player</title>
  <style>
    body {
      background-color: #f9f9f9;
      font-family: 'Segoe UI', sans-serif;
      color: #333;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2em;
    }

    .track {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 600px;
      margin-bottom: 15px;
      padding: 8px 12px;
      border-bottom: 1px solid #ddd;
    }

    .track span.name {
      flex: 1;
      text-align: left;
      font-size: 15px;
    }

    .track span.duration {
      width: 60px;
      text-align: right;
      font-size: 13px;
      color: #666;
    }

    audio {
      width: 200px;
      margin: 0 10px;
    }

    .loop-icon {
      font-size: 18px;
      cursor: pointer;
      user-select: none;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background-color 0.3s ease, color 0.3s ease;
      color: #888;
    }

    .loop-icon.active {
      background-color: #0078D4;
      color: #fff;
    }

    @media (max-width: 700px) {
      .track {
        flex-direction: column;
        align-items: center;
      }

      .track span.name,
      .track span.duration {
        width: 100%;
        text-align: center;
        margin-bottom: 5px;
      }

      audio {
        width: 100%;
        margin: 5px 0;
      }
    }
  </style>
</head>
<body>
  <h1>🎵 My Music Player</h1>

  <div class="track">
    <span class="name">3:59 AM</span>
    <audio id="audio1" controls>
      <source src="music/359AM.mp3" type="audio/mpeg">
    </audio>
    <span class="duration" id="duration1">--:--</span>
    <div class="loop-icon" onclick="toggleLoop('audio1', this)">🔁</div>
  </div>

  <div class="track">
    <span class="name">Rain</span>
    <audio id="audio2" controls>
      <source src="music/DIVINE - Rain  Prod. by Stunnah Beatz  Official Music Video.mp3" type="audio/mpeg">
    </audio>
    <span class="duration" id="duration2">--:--</span>
    <div class="loop-icon" onclick="toggleLoop('audio2', this)">🔁</div>
  </div>

  <div class="track">
    <span class="name">TT/Shutdown</span>
    <audio id="audio3" controls>
      <source src="music/Seedhe Maut - TT  Shutdown.mp3" type="audio/mpeg">
    </audio>
    <span class="duration" id="duration3">--:--</span>
    <div class="loop-icon" onclick="toggleLoop('audio3', this)">🔁</div>
  </div>

  <div class="track">
    <span class="name">Rain</span>
    <audio id="audio4" controls>
      <source src="music/Rain.mp3" type="audio/mpeg">
    </audio>
    <span class="duration" id="duration4">--:--</span>
    <div class="loop-icon" onclick="toggleLoop('audio4', this)">🔁</div>
  </div>

  <script>
    // Disable right-click on all audio elements
    document.querySelectorAll('audio').forEach(audio => {
      audio.addEventListener('contextmenu', e => e.preventDefault());

      // Show duration once metadata is loaded
      audio.addEventListener('loadedmetadata', () => {
        const id = audio.id.replace('audio', 'duration');
        const duration = formatTime(audio.duration);
        document.getElementById(id).textContent = duration;
      });
    });

    // Toggle loop and update icon style
    function toggleLoop(id, icon) {
      const audio = document.getElementById(id);
      audio.loop = !audio.loop;
      icon.classList.toggle('active', audio.loop);
    }

    // Format seconds to mm:ss
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }
  </script>
</body>
</html>
