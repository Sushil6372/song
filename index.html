<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minimal Music Player</title>
  <style>
    body {
      background-color: #f9f9f9;
      font-family: 'Segoe UI', sans-serif;
      color: #333;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .track {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .track h3 {
      margin: 0;
      font-size: 14px;
      flex: 1;
      text-align: left;
    }

    audio {
      width: 200px;
    }

    .loop-icon {
      cursor: pointer;
      font-size: 18px;
      user-select: none;
      transition: color 0.3s ease;
    }

    .loop-icon.active {
      color: #0078D4;
    }
  </style>
</head>
<body>
  <h1>🎵 My Music Player</h1>

  <div class="track">
    <h3>3:59 AM</h3>
    <audio id="audio1" controls>
      <source src="music/359AM.mp3" type="audio/mpeg">
    </audio>
    <span class="loop-icon" onclick="toggleLoop('audio1', this)">🔁</span>
  </div>

  <div class="track">
    <h3>Rain</h3>
    <audio id="audio2" controls>
      <source src="music/DIVINE - Rain  Prod. by Stunnah Beatz  Official Music Video.mp3" type="audio/mpeg">
    </audio>
    <span class="loop-icon" onclick="toggleLoop('audio2', this)">🔁</span>
  </div>

  <div class="track">
    <h3>TT/Shutdown</h3>
    <audio id="audio3" controls>
      <source src="music/Seedhe Maut - TT  Shutdown.mp3" type="audio/mpeg">
    </audio>
    <span class="loop-icon" onclick="toggleLoop('audio3', this)">🔁</span>
  </div>

  <div class="track">
    <h3>Rain</h3>
    <audio id="audio4" controls>
      <source src="music/Rain.mp3" type="audio/mpeg">
    </audio>
    <span class="loop-icon" onclick="toggleLoop('audio4', this)">🔁</span>
  </div>

  <script>
    // Disable right-click on all audio elements
    document.querySelectorAll('audio').forEach(audio => {
      audio.addEventListener('contextmenu', e => e.preventDefault());
    });

    // Toggle loop and update icon style
    function toggleLoop(id, icon) {
      const audio = document.getElementById(id);
      audio.loop = !audio.loop;
      icon.classList.toggle('active', audio.loop);
    }
  </script>
</body>
</html>
