<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🎶 My Music Player</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <h1>🎶 My Music Player</h1>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search song..." />
    <input type="range" id="globalVolume" min="0" max="1" step="0.01" value="1" />
    <button id="shuffleTopBtn"><i class="fas fa-random"></i></button>
    <button id="darkModeBtn"><i class="fas fa-moon"></i></button>
  </div>

  <div id="trackList"></div>

  <script src="script.js"></script>
</body>
</html>
